site_name: "Swift iOS — Do Zero ao Avançado"
site_url: https://jvcamposs.github.io/safeville/
repo_url: https://github.com/jvcamposs/safeville
repo_name: jvcamposs/safeville
site_description: "Curso completo e gratuito de desenvolvimento iOS com Swift — do básico ao avançado."
site_author: "jvcamposs"

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: blue
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
    - scheme: slate
      primary: blue
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/apple
    repo: fontawesome/brands/github
  favicon: material/apple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.share
    - toc.follow

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jvcamposs/safeville
      name: Repositório no GitHub

copyright: "© 2025 Swift iOS Course — MIT License"

