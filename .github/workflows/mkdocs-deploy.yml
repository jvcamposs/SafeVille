name: Publicar Curso (GitHub Pages)

on:
  push:
    branches:
      - main
      - claude/swift-ios-course-mkdocs-PQw5j
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install mkdocs-material==9.5.18

      - run: mkdocs gh-deploy --force
